<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Informe Gestión Pedagógica 2022–2026 | UGEL San Román</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.0/dist/reset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.0/dist/reveal.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
<style>
:root{
  --navy:#0B1D3A;--blue:#1E4D9B;--sky:#2E6BC8;--teal:#0F7A5E;
  --gold:#D4A017;--amber:#E8B824;--white:#FFFFFF;--snow:#F5F7FC;
  --light:#EAF0FA;--gbg:#F1F5FC;--gbd:#BDD0E8;--border:#BDD0E8;
  --gd:#0F1923;--gm:#3D4D5C;--gl:#7A8A9A;
  --sh:0 4px 18px rgba(11,29,58,.14);--sm:0 8px 36px rgba(11,29,58,.20);
  --r:16px;
}
.reveal-viewport{background:#050E1D}
.reveal{font-family:'Plus Jakarta Sans','Segoe UI',sans-serif}
.reveal .slides>section{padding:0;height:100%;top:0!important}
.reveal .progress{color:var(--gold);height:4px}
.reveal .progress span{background:linear-gradient(90deg,var(--gold),var(--amber))!important}
.reveal .controls{color:rgba(255,255,255,.6)}
.reveal .slide-number{background:rgba(15,23,42,.85);color:rgba(255,255,255,.85);border-radius:20px;padding:5px 13px;font-family:inherit;font-size:13px;bottom:18px;right:70px}

/* ── BASE ── */
.slide{width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;font-family:'Plus Jakarta Sans',sans-serif;}

/* ── PORTADA ── */
/* ── PORTADA — Modern Hero ── */
.slide-portada{flex-direction:row;background:#050E1D;position:relative;overflow:hidden}
.pv2-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  filter:brightness(.82) saturate(.85);z-index:0}
.pv2-ov{position:absolute;inset:0;z-index:1;background:
  linear-gradient(90deg,rgba(5,14,29,.92) 0%,rgba(5,14,29,.70) 32%,rgba(5,14,29,.15) 58%,rgba(5,14,29,.0) 100%)}
.pv2-grid{position:absolute;inset:0;z-index:1;
  background-image:linear-gradient(rgba(43,93,163,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(43,93,163,.04) 1px,transparent 1px);
  background-size:64px 64px}
.pv2-ghost{position:absolute;right:-15px;bottom:-55px;font-size:270px;font-weight:800;
  color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.038);
  z-index:1;line-height:1;pointer-events:none;user-select:none;letter-spacing:-10px}
.pv2-glow1{position:absolute;top:-90px;right:180px;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(43,93,163,.08) 0%,transparent 70%);z-index:1;pointer-events:none}
.pv2-glow2{position:absolute;bottom:20px;right:50px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(168,122,32,.08) 0%,transparent 70%);z-index:1;pointer-events:none}

/* Glass content card */
.pv2-card{position:relative;z-index:3;width:408px;flex-shrink:0;
  margin:26px 0 50px 34px;padding:28px 32px;
  background:rgba(8,18,36,.68);
  backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
  border:1px solid rgba(255,255,255,.09);border-radius:22px;
  box-shadow:0 28px 64px rgba(0,0,0,.58),0 0 0 1px rgba(255,255,255,.04),
    inset 0 1px 0 rgba(255,255,255,.11);
  display:flex;flex-direction:column}
.pv2-card::before{content:'';position:absolute;top:0;left:12px;right:12px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(212,160,23,.9),rgba(232,184,36,.98),rgba(212,160,23,.7),transparent);
  border-radius:2px}
.pv2-logo{width:172px;height:auto;object-fit:contain}
.pv2-tag{font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  color:rgba(232,184,36,.95);margin:18px 0 0}
.pv2-accent{width:40px;height:3px;background:linear-gradient(90deg,var(--gold),var(--amber));
  border-radius:2px;margin:12px 0 13px}
.pv2-title{font-size:35px;font-weight:800;color:#fff;line-height:1.05;margin-bottom:8px}
.pv2-years{font-size:48px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,#D4A017 0%,#F0C030 50%,#C08010 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pv2-dir{margin-top:auto;padding-top:15px;border-top:1px solid rgba(255,255,255,.08);
  font-size:12px;color:rgba(148,180,220,.7);line-height:1.65}

/* Right side: KPI chips */
.pv2-right{flex:1;position:relative;z-index:2;
  display:flex;flex-direction:column;justify-content:center;
  align-items:flex-end;padding:36px 40px 52px;gap:10px}
.pv2-kpi{
  background:rgba(8,18,36,.62);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;
  padding:13px 16px;display:flex;align-items:center;gap:12px;width:222px;
  box-shadow:0 8px 30px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.07);
  position:relative;overflow:hidden}
.pv2-kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.pv2-kpi-ico{font-size:24px;flex-shrink:0}
.pv2-kpi-v{font-size:19px;font-weight:800;color:#fff;line-height:1.15}
.pv2-kpi-l{font-size:10px;color:rgba(148,180,212,.62);margin-top:2px;line-height:1.35}

/* Bottom info bar */
.pv2-bar{position:absolute;bottom:0;left:0;right:0;height:42px;z-index:5;
  background:rgba(8,18,36,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;padding:0 32px}
.pv2-bi{font-size:11px;color:rgba(148,180,212,.62);display:flex;align-items:center;gap:6px}
.pv2-bd{width:3px;height:3px;border-radius:50%;background:rgba(212,160,23,.85);flex-shrink:0}
.pv2-bs{width:1px;height:15px;background:rgba(255,255,255,.1);margin:0 14px}

/* ── SECTION DIVIDER ── */
.slide-section{flex-direction:row;background:#fff;overflow:hidden}
.sec-left{
  width:600px;flex-shrink:0;padding:48px 42px;display:flex;flex-direction:column;
  position:relative;overflow:hidden;z-index:2;
  clip-path:polygon(0 0,calc(100% + 72px) 0,100% 100%,0 100%)
}
.sec-left.navy{background:linear-gradient(140deg,#050E1D 0%,#0B1D3A 100%)}
.sec-left.teal{background:linear-gradient(140deg,#050E1D 0%,#0F7A5E 100%)}
.sec-left.blue{background:linear-gradient(140deg,#050E1D 0%,#1E4D9B 70%,#2E6BC8 100%)}
.sec-left.gold{background:linear-gradient(140deg,#150A00 0%,#7A5012 100%)}
.sec-left.cyan{background:linear-gradient(140deg,#050E1D 0%,#1A5580 100%)}
.sec-left.emerald{background:linear-gradient(140deg,#050E1D 0%,#0A5030 100%)}
.sec-deco1{position:absolute;bottom:-80px;left:-65px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.sec-deco2{position:absolute;top:-60px;right:30px;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.sec-deco3{position:absolute;top:50%;right:110px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;transform:translateY(-50%)}
.sec-ghost{position:absolute;bottom:0px;left:10px;font-size:260px;font-weight:800;color:rgba(255,255,255,.06);line-height:1;pointer-events:none;user-select:none}
.sec-tbar{position:absolute;bottom:0;left:0;right:0;height:7px;background:rgba(255,255,255,.25)}
.sec-logo{width:185px;height:auto;object-fit:contain;margin-bottom:auto;position:relative;z-index:2}
.sec-tag{font-size:13px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:10px;position:relative;z-index:2}
.sec-title{font-size:56px;font-weight:800;color:#fff;line-height:1.0;position:relative;z-index:2}
.sec-right{flex:1;padding:44px 40px;display:flex;flex-direction:column;justify-content:center;z-index:1;background:#fff;position:relative;overflow:hidden}
.sec-badge{display:inline-block;background:var(--light);border:2px solid var(--gbd);border-radius:24px;padding:8px 22px;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:22px;align-self:flex-start}
.sec-rtitle{font-size:56px;font-weight:800;color:#B8CEFF;line-height:1.05;margin-bottom:16px}
.sec-rline{width:64px;height:4px;background:var(--gbd);border-radius:2px;margin-bottom:16px}
.sec-rsub{font-size:19px;color:var(--gm);line-height:1.7}
.sec-img{margin-top:22px;max-height:160px;object-fit:contain;align-self:flex-start}

/* ── CONTENT SLIDE ── */
.slide-content{background:var(--gbg)}
.s-hd{height:90px;background:#fff;border-bottom:5px solid transparent;border-image:linear-gradient(90deg,var(--navy),var(--blue),var(--sky)) 1;display:flex;align-items:center;padding:0 28px 0 0;flex-shrink:0;box-shadow:var(--sh)}
.s-hd::before{content:'';width:10px;height:100%;background:linear-gradient(to bottom,var(--navy),var(--blue));flex-shrink:0;margin-right:22px}
.s-hd-t{flex:1}
.s-hd-t h2{font-size:22px;font-weight:800;color:var(--navy);line-height:1.2}
.s-hd-t p{font-size:13px;color:var(--gm);margin-top:4px;font-style:italic}
.s-hd-logo{height:64px;width:auto;object-fit:contain}
.s-bd{flex:1;min-height:0;padding:14px 24px 12px;display:flex;flex-direction:column;gap:10px}
.s-ft{height:36px;background:#fff;border-top:1px solid var(--gbd);display:flex;align-items:center;padding:0 14px;flex-shrink:0;position:relative}
.s-ft::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:linear-gradient(to bottom,var(--navy),var(--blue))}
.s-ft-t{font-size:12px;color:var(--gl);font-style:italic;padding-left:12px;flex:1}
.s-ft-n{width:24px;height:24px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

/* ── KPI CARDS ── */
.kpi-row{display:flex;gap:10px}
.kpi{flex:1;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--gbd)}
.kpi-top{height:6px}
.kpi-bd{padding:12px 16px}
.kpi-v{font-size:34px;font-weight:800;line-height:1}
.kpi-l{font-size:13px;color:var(--gm);margin-top:5px}
.kpi-dk{flex:1;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);border-radius:var(--r);padding:12px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi-dk::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--amber))}
.kpi-dk .kpi-l{color:var(--sky);font-size:11px;letter-spacing:2px;font-weight:700;margin-top:6px}
.kpi-dk .kpi-v{font-size:30px;font-weight:800;color:#fff}

/* ── BAR CHART ── */
.chart-row{flex:1;min-height:0;display:flex;gap:12px}
.bars-wrap{flex:0 0 490px;background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--gbd);padding:14px 16px;display:flex;flex-direction:column}
.bars-lbl{font-size:12px;font-weight:700;color:var(--gm);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.bars{display:flex;gap:18px;flex:1;min-height:0;align-items:flex-end;padding-bottom:2px}
.bar-g{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar-pct{font-size:20px;font-weight:800;margin-bottom:6px}
.bar-tr{width:100%;flex:1;max-height:185px;background:var(--gbg);border-radius:8px;display:flex;align-items:flex-end;overflow:hidden;border:1px solid var(--gbd)}
.bar-fi{width:100%;border-radius:7px 7px 0 0;transform:scaleY(0);transform-origin:bottom;transition:transform 1.2s cubic-bezier(.34,1.15,.64,1)}
.bar-fi.anim{transform:scaleY(1)}
.bar-yr{margin-top:8px;font-size:13px;font-weight:700;color:#fff;padding:4px 14px;border-radius:20px}
.img-wrap{flex:1;min-width:0;display:flex;gap:10px;align-items:stretch}
.s-img{flex:1;object-fit:contain;border-radius:var(--r);box-shadow:var(--sm);max-width:100%}
.s-img,.photo-link img,.swiper-slide img,.ienc-slide img,.iienc-slide img,.split-p img,.onem-photo,.onem-stu{
  display:block;background:#fff;overflow:hidden;clip-path:inset(.5px round var(--r));
}
.photo-link{border-radius:inherit;overflow:hidden;background:#fff}
.s-img{border:1px solid rgba(189,208,232,.65)}

/* ── CHART-ONLY BODY ── */
.chart-body{flex:1;min-height:0;padding:12px 22px;display:flex;align-items:center;justify-content:center;background:var(--gbg)}
.chart-body img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--r);box-shadow:var(--sm)}

/* ── EBR 2025 ── */
.ebr-main{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);border-radius:14px;padding:20px 26px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--sm);flex:1}
.ebr-main::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--gold)}
.ebr-pct{font-size:74px;font-weight:800;line-height:1;margin:4px 0}
.ebr-lbl{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--sky);text-transform:uppercase;margin-bottom:4px}
.ebr-sub{font-size:11px;color:rgba(255,255,255,.5);font-style:italic}
.ebr-deco{position:absolute;bottom:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04)}

/* ── COMPETITION CARDS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:11px;flex:1;min-height:0}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;flex:1;min-height:0}
.comp-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--gbd);display:flex;flex-direction:column}
.comp-top{padding:10px 14px;color:#fff;font-size:15px;font-weight:700;letter-spacing:2px;text-align:center}
.comp-body{padding:10px 14px;flex:1}
.comp-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--gbg);font-size:13px;color:var(--gd);line-height:1.4}
.comp-item:last-child{border-bottom:none}
.comp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}

/* ── TROPHY CARDS ── */
.trophy{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sm);border:1px solid var(--gbd);display:flex;flex-direction:column;align-items:center;text-align:center}
.trophy-top{width:100%;padding:11px 14px;color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;text-align:center;text-transform:uppercase}
.trophy-icon{font-size:56px;padding:16px 0 6px}
.trophy-place{font-size:22px;font-weight:800;padding:0 14px;line-height:1.2}
.trophy-who{font-size:13px;font-weight:600;color:var(--gd);padding:6px 14px}
.trophy-ie{font-size:12px;color:var(--gm);padding:7px 14px 15px;border-top:1px solid var(--gbd);margin-top:4px;width:100%}

/* ── ONEM PREMIO ── */
.onem-row{display:flex;gap:12px;flex:1;min-height:0}
.onem-photo{flex:2;object-fit:cover;border-radius:var(--r);box-shadow:var(--sm)}
.onem-side{flex:0 0 220px;display:flex;flex-direction:column;gap:9px}
.onem-stu{border-radius:var(--r);object-fit:cover;box-shadow:var(--sh);flex:0 0 130px;width:100%}
.medal-list{display:flex;flex-direction:column;gap:7px;flex:1}
.medal-item{background:#fff;border-radius:var(--r);border:1px solid var(--gbd);padding:9px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.medal-em{font-size:28px}
.medal-txt strong{font-size:14px;color:var(--navy);display:block}
.medal-txt span{font-size:12px;color:var(--gm)}

/* ── ENCUENTROS ── */
.enc-row{display:flex;gap:14px;flex:1;min-height:0}

/* ── I ENCUENTRO CARRUSEL INFINITO ── */
.ienc-track{display:flex;height:100%;width:max-content;animation:ienc-scroll 52s linear infinite}
.ienc-slide{flex-shrink:0;width:500px;height:100%;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(13,34,64,.18);margin-right:14px}
.ienc-slide img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes ienc-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── II ENCUENTRO CARRUSEL INFINITO (pequeño) ── */
.iienc-track{display:flex;height:100%;width:max-content;animation:iienc-scroll 48s linear infinite}
.iienc-slide{flex-shrink:0;width:250px;height:100%;border-radius:10px;overflow:hidden;box-shadow:0 3px 14px rgba(13,148,136,.18);margin-right:12px}
.iienc-slide img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes iienc-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.enc-card{flex:1;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--gbd);display:flex;flex-direction:column}
.enc-top{padding:11px 18px;color:#fff;font-size:14px;font-weight:700;letter-spacing:3px;text-align:center;text-transform:uppercase}
.enc-num{font-size:100px;font-weight:800;color:var(--light);line-height:1;padding:8px 20px 0}
.enc-ttl{font-size:22px;font-weight:700;color:var(--navy);padding:0 20px 14px;border-bottom:1px solid var(--gbd);line-height:1.2}
.enc-body{padding:14px 20px;flex:1}
.enc-lbl{font-size:12px;font-weight:700;color:var(--gm);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.enc-det{font-size:16px;font-weight:600;color:var(--gd);margin-bottom:12px}
.enc-quote{background:var(--light);border-left:4px solid var(--sky);border-radius:0 8px 8px 0;padding:11px 14px;font-size:14px;color:var(--teal);font-style:italic}

/* ── DIPLOMADOS ── */
.dip-row{display:flex;gap:14px;flex:1;min-height:0}
.dip-card{flex:1;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--gbd);display:flex;flex-direction:column;align-items:center}
.dip-top{width:100%;padding:11px;color:#fff;font-size:12px;font-weight:700;letter-spacing:3px;text-align:center;text-transform:uppercase}
.dip-icon{font-size:58px;padding:20px 0 10px}
.dip-ttl{font-size:18px;font-weight:700;padding:14px 16px 20px;text-align:center;line-height:1.3;border-top:1px solid var(--gbd);margin-top:auto;width:100%}

/* ── CEPRE ── */
.cepre-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
.cepre-main{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:18px;padding:34px 50px;color:#fff;text-align:center;max-width:580px;width:100%;position:relative;overflow:hidden;box-shadow:var(--sm)}
.cepre-main::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--gold)}
.cepre-deco{position:absolute;bottom:-55px;right:-55px;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.04)}
.cepre-pre{font-size:13px;letter-spacing:5px;color:var(--sky);font-weight:700;margin-bottom:8px;text-transform:uppercase}
.cepre-uni{font-size:18px;font-weight:700;margin-bottom:10px;color:rgba(255,255,255,.8)}
.cepre-g{width:55px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 14px}
.cepre-sede{font-size:62px;font-weight:800;line-height:1;margin-bottom:14px}
.cepre-desc{font-size:15px;color:rgba(255,255,255,.65);line-height:1.5}

/* ── CLOSING ── */
.slide-closing{flex-direction:row;background:var(--snow)}
.cl-left{width:420px;flex-shrink:0;background:var(--navy);padding:42px 34px;display:flex;flex-direction:column;position:relative;overflow:hidden;z-index:2;clip-path:polygon(0 0,calc(100% + 65px) 0,100% 100%,0 100%)}
.cl-d1{position:absolute;bottom:-70px;left:-55px;width:280px;height:280px;border-radius:50%;background:rgba(0,0,0,.2)}
.cl-d2{position:absolute;top:-70px;right:20px;width:210px;height:210px;border-radius:50%;background:rgba(14,165,233,.06)}
.cl-tbar{position:absolute;bottom:0;left:0;right:0;height:8px;background:var(--teal)}
.cl-logo{width:170px;height:auto;object-fit:contain;margin-bottom:26px;position:relative;z-index:2}
.cl-div{width:46px;height:4px;background:var(--gold);border-radius:2px;margin-bottom:16px;position:relative;z-index:2}
.cl-msg{font-size:32px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:18px;position:relative;z-index:2}
.cl-dir{margin-top:auto;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);font-size:14px;color:rgba(149,178,212,.85);line-height:1.6;position:relative;z-index:2}
.cl-right{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden;z-index:1}

.cl-yr-b{font-size:115px;font-weight:800;color:var(--navy);line-height:1}
.cl-yr-div{height:6px;background:linear-gradient(90deg,var(--gold),var(--sky));border-radius:3px;margin:8px 50px}
.cl-yr-lbl{font-size:10px;font-weight:700;letter-spacing:4px;color:var(--sky);text-transform:uppercase;margin-top:10px}
.cl-img{position:absolute;right:0;top:0;height:100%;width:175px;object-fit:cover;object-position:center;opacity:.18}

/* ── INDEX ── */
.idx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0;align-content:center}
.idx-item{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--gbd);display:flex;align-items:center;gap:14px;padding:15px 18px;position:relative}
.idx-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
.idx-num{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.idx-ttl{font-size:16px;font-weight:700;color:var(--navy)}
.idx-sub{font-size:12px;color:var(--gm);margin-top:3px}

/* ── SPLIT (ENLA 2°SEC) ── */
.split-bd{display:flex;gap:11px;flex:1;min-height:0}
.split-p{flex:1;display:flex;flex-direction:column;gap:7px}
.split-lbl{padding:8px 12px;font-size:14px;font-weight:700;color:#fff;text-align:center;border-radius:6px}
.split-p img{flex:1;object-fit:contain;border-radius:var(--r);box-shadow:var(--sm)}

/* ── OBRAS TIMELINE ── */
.obra-list{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.obra-item{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--gbd);display:flex;align-items:center;gap:13px;padding:10px 15px;overflow:hidden;position:relative}
.obra-yr{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.obra-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
.obra-cost{font-size:13px;color:var(--teal);font-weight:600}

/* ── INDICATOR GRID (CdD) ── */
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1;min-height:0}
.ind-yr{background:#fff;border-radius:var(--r);border:1px solid var(--gbd);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.ind-yr-hd{padding:8px 10px;font-size:13px;font-weight:800;color:#fff;text-align:center;letter-spacing:1.5px}
.ind-item{padding:5px 9px;font-size:12px;color:var(--gd);border-bottom:1px solid #F8FAFD;display:flex;align-items:center;gap:6px;line-height:1.35}
.ind-item:last-child{border-bottom:none}
.ind-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ind-ok{background:#0E6E4A}
.ind-par{background:#92690C}
.ind-no{background:#B01C1C}
.ind-exc{background:#94A3B8}

/* ── EDU CUNA CARDS ── */
.cuna-card{background:#fff;border-radius:var(--r);border:1px solid var(--gbd);box-shadow:var(--sh);padding:9px 13px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.cuna-icon{font-size:30px;flex-shrink:0}
.cuna-ie{font-size:14px;font-weight:700;color:var(--navy);line-height:1.2}
.cuna-num{font-size:12px;color:var(--gm);margin-top:2px}

/* ── SECTION PATTERN (right side deco) ── */
.sec-pattern{position:absolute;right:-30px;top:50%;transform:translateY(-50%);opacity:.07;pointer-events:none}

/* ── WEB-LIKE HOVER & TRANSITION EFFECTS ── */
.kpi,.comp-card,.trophy,.enc-card,.dip-card,.cuna-card{
  transition:transform .22s cubic-bezier(.34,1.15,.64,1),box-shadow .22s ease}
.kpi:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(13,34,64,.18)}
.comp-card:hover,.trophy:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(13,34,64,.15)}
.enc-card:hover,.dip-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(13,34,64,.14)}
.cuna-card:hover{transform:translateX(5px);box-shadow:0 6px 22px rgba(13,34,64,.12)}
.idx-item{transition:transform .2s cubic-bezier(.34,1.15,.64,1),box-shadow .2s}
.idx-item:hover{transform:translateX(5px) scale(1.01);box-shadow:0 8px 28px rgba(13,34,64,.14)}
.obra-item{transition:transform .2s cubic-bezier(.34,1.15,.64,1),box-shadow .2s,border-color .2s}

.medal-item{transition:transform .2s,box-shadow .2s}

/* Improved s-hd: gradient bottom line instead of border-image */
.s-hd{border-bottom:none;border-image:none;overflow:hidden;background:linear-gradient(135deg,#fff 0%,#F1F5FC 100%)}
.s-hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--navy) 0%,var(--blue) 50%,var(--sky) 100%)}

/* Richer kpi-dk dark card */
.kpi-dk{background:linear-gradient(135deg,#040D1A 0%,var(--navy) 55%,var(--blue) 100%)}

/* EBR block watermark */
.ebr-main{overflow:hidden}
.ebr-main::after{content:'✓';position:absolute;right:-10px;bottom:-24px;font-size:130px;
  color:rgba(255,255,255,.04);line-height:1;pointer-events:none}

/* Portada right image zone — subtle vignette on far right */
.pv2-right-img{flex:1;position:relative;z-index:2;display:flex;align-items:center;justify-content:flex-end;padding-right:32px}

/* Fade-in base for GSAP targets (prevents FOUC) */
.gsap-ready .s-hd,.gsap-ready .s-ft{opacity:1}

/* ── ÍNDICE v2 — Icon cards 4 cols ── */
.idx2-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;flex:1;min-height:0;align-content:center}
.idx2-card{
  background:#fff;border-radius:18px;

}

.idx2-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.18);flex-shrink:0}

.idx2-num{font-size:30px;font-weight:800;line-height:1;margin-bottom:6px}
.idx2-ttl{font-size:13.5px;font-weight:700;color:#1E293B;line-height:1.3;margin-bottom:5px}
.idx2-sub{font-size:11px;color:#64748B;line-height:1.45}

/* ── SECTION DIVIDER v2 — Full Screen Cinematic ── */
.secdiv{position:relative;overflow:hidden;justify-content:center;align-items:center;flex-direction:column;background:#050E1D}
.secdiv.navy{background:linear-gradient(145deg,#050E1D 0%,#091526 55%,#0B1D3A 100%)}
.secdiv.teal{background:linear-gradient(145deg,#050E1D 0%,#083020 55%,#0F7A5E 100%)}
.secdiv.blue{background:linear-gradient(145deg,#050E1D 0%,#0E2050 55%,#1E4D9B 100%)}
.secdiv.gold{background:linear-gradient(145deg,#100900 0%,#2E1C00 55%,#7A5012 100%)}
.secdiv.cyan{background:linear-gradient(145deg,#050E1D 0%,#0C2040 55%,#1A5580 100%)}
.secdiv.emerald{background:linear-gradient(145deg,#050E1D 0%,#072015 55%,#0A5030 100%)}
.secdiv-ghost{position:absolute;font-size:340px;font-weight:800;color:rgba(255,255,255,.04);line-height:1;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;user-select:none;z-index:0;letter-spacing:-20px}
.secdiv-grid{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:72px 72px}
.secdiv-content{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center}
.secdiv-logo{width:96px;height:auto;object-fit:contain;margin-bottom:18px;opacity:.9;filter:drop-shadow(0 4px 14px rgba(0,0,0,.5))}
.secdiv-tag{font-size:11px;font-weight:700;letter-spacing:7px;text-transform:uppercase;color:rgba(180,210,255,.5);margin-bottom:10px}
.secdiv-title{font-size:72px;font-weight:800;color:#fff;line-height:1.05;text-shadow:0 4px 30px rgba(0,0,0,.4);margin:0}
.secdiv-line{width:90px;height:5px;border-radius:3px;margin:18px auto 14px}
.secdiv-sub{font-size:16px;color:rgba(180,210,255,.48);line-height:1.65;max-width:600px}

/* ── SWIPER overrides ── */
.swiper{width:100%;height:100%}
.swiper-slide img{width:100%;height:100%;object-fit:cover;border-radius:0}
.swiper-pagination-bullet{background:rgba(255,255,255,.5);opacity:1;width:8px;height:8px}
.swiper-pagination-bullet-active{background:var(--gold);transform:scale(1.3)}
.swiper-button-next,.swiper-button-prev{color:#fff;--swiper-navigation-size:22px;background:rgba(0,0,0,.35);width:36px;height:36px;border-radius:50%;padding:4px}

/* ── GLIGHTBOX overrides ── */
.glightbox-open{overflow:hidden}
.gslide-image img{max-height:90vh;border-radius:8px}
.photo-link{display:block;width:100%;height:100%;cursor:zoom-in;position:relative}
.photo-link::after{content:'+';position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;font-size:20px;font-weight:300;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none;line-height:32px;text-align:center}

/* ── LEGEND ROW ── */
.legend-row{display:flex;gap:16px;justify-content:center;align-items:center;padding:6px 0}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:12px;color:var(--gm);font-weight:600}

/* ── RACIONALIZACION TABLE ── */
.rac-table{display:flex;flex-direction:column;flex:1;min-height:0;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--gbd)}
.rac-hd{display:grid;grid-template-columns:1.6fr 55px 1.4fr 44px;gap:6px;padding:9px 14px;background:var(--navy);color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;flex-shrink:0}

.rac-row{display:grid;grid-template-columns:1.6fr 55px 1.4fr 44px;gap:6px;padding:7px 14px;border-bottom:1px solid #F1F5F9;font-size:12px;color:var(--gd)}
.rac-row:nth-child(even){background:#FAFBFD}
.rac-row .n{font-weight:700;color:var(--navy)}
.rac-foot{display:grid;grid-template-columns:1.6fr 55px 1.4fr 44px;gap:6px;padding:9px 14px;background:var(--light);border-top:2px solid var(--navy);font-size:13px;font-weight:800;color:var(--navy);flex-shrink:0}

/* Theme refresh: formal, interactive, institutional */
:root{

.kpi:hover,.comp-card:hover,.trophy:hover,.enc-card:hover,.dip-card:hover,.idx2-card:hover{

.kpi-top{height:5px}

.bar-tr{background:#E8EEF6;border-color:#C7D6E6}

.idx2-card{border-radius:12px}

.idx2-sub{color:var(--gl)}
.secdiv.navy{background:linear-gradient(145deg,#040B16 0%,#07172E 58%,#123A76 100%)}
.secdiv.blue{background:linear-gradient(145deg,#041122 0%,#0A2C68 58%,#185ABC 100%)}

.pv2-card{

}

/* ── Hover interactivo en tarjetas KPI ── */
.kpi, .kpi-dk {
  transition: transform .2s ease, box-shadow .2s ease;
  cursor: default;
}
.kpi:hover  { transform: translateY(-4px) scale(1.03); box-shadow: 0 10px 28px rgba(0,0,0,.15) !important; }

  transition: box-shadow .25s ease, transform .25s ease;
}

  box-shadow: 0 14px 38px rgba(0,0,0,.13) !important;
  transform: translateY(-2px);
}

@keyframes ppFloat { 0%,100%{transform:translateY(0);opacity:.05} 50%{transform:translateY(-14px);opacity:.09} }
.secdiv .secdiv-ghost { animation: ppFloat 5s ease-in-out infinite !important; }

@keyframes ppGlow { 0%,100%{opacity:1;filter:brightness(1)} 50%{opacity:.75;filter:brightness(1.4)} }

canvas { cursor: crosshair; }

/* Botones de navegación reveal — más visibles */
.reveal .controls { opacity: .55; transition: opacity .3s; }
.reveal .controls:hover { opacity: 1; }

/* ── GSAP slide-entry animations ── */
function animateSlideIn(slide) {
  if (!window.gsap) return;

  // Header & footer
  const hd = slide.querySelector('.s-hd');
  const ft = slide.querySelector('.s-ft');
  if (hd) gsap.fromTo(hd, {opacity:0,y:-16}, {opacity:1,y:0,duration:.42,ease:'power3.out'});
  if (ft) gsap.fromTo(ft, {opacity:0}, {opacity:1,duration:.4,delay:.38,ease:'power2.out'});

  // Old split section dividers
  const secL = slide.querySelector('.sec-left');
  if (secL) {
    gsap.fromTo(secL, {opacity:0,x:-50}, {opacity:1,x:0,duration:.62,ease:'power3.out'});
    const secR = slide.querySelector('.sec-right');
    if (secR) gsap.fromTo(secR, {opacity:0,x:35}, {opacity:1,x:0,duration:.62,delay:.12,ease:'power3.out'});
  }
  // New cinematic section divider
  const secdivC = slide.querySelector('.secdiv-content');
  if (secdivC) gsap.fromTo(secdivC, {opacity:0,y:38,scale:.97}, {opacity:1,y:0,scale:1,duration:.78,ease:'power3.out'});

  // Portada glass card
  const pvCard = slide.querySelector('.pv2-card');
  if (pvCard) gsap.fromTo(pvCard, {opacity:0,x:-32,scale:.97}, {opacity:1,x:0,scale:1,duration:.78,ease:'power3.out'});
  const pvBar = slide.querySelector('.pv2-bar');
  if (pvBar) gsap.fromTo(pvBar, {opacity:0,y:20}, {opacity:1,y:0,duration:.55,delay:.35,ease:'power3.out'});

  // Closing slide
  const clL = slide.querySelector('.cl-left');
  if (clL) {
    gsap.fromTo(clL, {opacity:0,x:-42}, {opacity:1,x:0,duration:.65,ease:'power3.out'});
    const clR = slide.querySelector('.cl-right');
    if (clR) gsap.fromTo(clR, {opacity:0,scale:.94}, {opacity:1,scale:1,duration:.65,delay:.16,ease:'power3.out'});
  }

  // Staggered card / list elements
  const cards = slide.querySelectorAll(
    '.kpi,.kpi-dk,.comp-card,.trophy,.enc-card,.dip-card,.obra-item,.ind-yr,.cuna-card,.idx-item,.medal-item,.idx2-card'
  );
  if (cards.length) {
    gsap.fromTo(cards,
      {opacity:0, y:24},
      {opacity:1, y:0, duration:.52, stagger:.075, delay:.22, ease:'power3.out'}
    );
  }

  // Chart / media blocks
  const media = slide.querySelectorAll(
    '.chart-row,.bars-wrap,.img-wrap,.onem-row,.onem-photo,.chart-body,.split-bd,.kpi-row'
  );
  if (media.length) {
    gsap.fromTo(media,
      {opacity:0, scale:.97},
      {opacity:1, scale:1, duration:.58, stagger:.05, delay:.16, ease:'power3.out'}
    );
  }

  // Paneles flex internos de slides nuevos (inicial, primaria, secundaria, etc.)
  const sBdPanels = slide.querySelectorAll('.s-bd > div');
  if (sBdPanels.length) {
    gsap.fromTo(sBdPanels,
      {opacity:0, y:22},
      {opacity:1, y:0, duration:.5, stagger:.08, delay:.25, ease:'power3.out'}
    );
  }

  // Paneles internos dentro del área principal de gráficos
  const innerPanels = slide.querySelectorAll('.s-bd > div > div');
  if (innerPanels.length) {
    gsap.fromTo(innerPanels,
      {opacity:0, scale:.96},
      {opacity:1, scale:1, duration:.45, stagger:.06, delay:.35, ease:'power2.out'}
    );
  }
}

/* ── tsParticles — cinematic background for section dividers ── */
let _prtInst = null;
async function initParticles() {
  if (_prtInst || !window.tsParticles) return;
  try {
    _prtInst = await tsParticles.load('prt-bg', {
      background: { color: { value: 'transparent' } },
      fpsLimit: 60,
      particles: {
        number: { value: 52, density: { enable: true, area: 900 } },
        color: { value: ['#60A5FA','#38BDF8','#818CF8','#34D399','#C9A84C'] },
        links: { enable: true, color: '#3B82F6', opacity: 0.14, distance: 140, width: 1 },
        move: { enable: true, speed: 0.65, outModes: 'bounce', random: true },
        opacity: { value: { min: 0.18, max: 0.55 }, animation: { enable: true, speed: 0.5, sync: false } },
        size: { value: { min: 1, max: 2.5 } }
      },
      interactivity: {
        events: {
          onHover: { enable: true, mode: 'repulse' },
          onClick:  { enable: true, mode: 'push' }
        },
        modes: {
          repulse: { distance: 90, duration: 0.4 },
          push:    { quantity: 4 }
        }
      },
      detectRetina: true
    });
  } catch(e) { /* CDN not loaded */ }
}
function toggleParticles(slide) {
  const bg = document.getElementById('prt-bg');
  if (!bg) return;
  const on = !!slide.querySelector('.secdiv');
  bg.style.opacity = on ? '1' : '0';
  if (on) initParticles();
}

/* ── CountUp.js — animate numbers on entry ── */
function animateCounters(slide) {
  const CU = window.countUp?.CountUp;
  if (!CU) return;
  slide.querySelectorAll('.kpi-v, .ebr-pct').forEach(el => {
    if (el.dataset.cuDone) return;
    el.dataset.cuDone = '1';
    const raw = el.textContent.trim();
    const num = parseFloat(raw.replace(/[^0-9.]/g, ''));
    if (isNaN(num) || num === 0) return;
    const dec = (raw.match(/\.(\d+)/)?.[1]?.length) || 0;
    const cu = new CU(el, num, {
      duration: 2.2, decimalPlaces: dec, useGrouping: true,
      prefix: raw.includes('S/') ? 'S/ ' : '',
      suffix: raw.includes('%') ? '%' : ''
    });
    if (!cu.error) cu.start();
  });
}

/* ── Typed.js — typewriter on section titles ── */
function initTypedTitle(slide) {
  if (!window.Typed) return;
  slide.querySelectorAll('[data-typed]').forEach(el => {
    if (el.dataset.typedDone) return;
    el.dataset.typedDone = '1';
    const text = el.dataset.typed;
    el.innerHTML = '';
    new Typed(el, { strings: [text], typeSpeed: 48, showCursor: false, startDelay: 420, html: true });
  });
}

/* ── Swiper — photo carousel ── */
function initSwipers(slide) {
  if (!window.Swiper) return;
  slide.querySelectorAll('.swiper:not(.swiper-initialized)').forEach(el => {
    new Swiper(el, {
      loop: true,
      autoplay: { delay: 3200, disableOnInteraction: false },
      pagination: { el: el.querySelector('.swiper-pagination'), clickable: true },
      navigation: { nextEl: el.querySelector('.swiper-button-next'), prevEl: el.querySelector('.swiper-button-prev') },
      effect: 'fade',
      fadeEffect: { crossFade: true },
      speed: 700
    });
  });
}

/* ── Slide event handlers ── */
function onSlide(slide) {
  triggerBars(slide);
  if (slide.querySelector('#innov-fondep-chart')) setTimeout(initInnovFondepChart, 200);
  if (slide.querySelector('#cts-year-chart'))    setTimeout(initCtsCtsChart, 200);
  if (slide.querySelector('#ats-year-chart'))    setTimeout(initCtsAtsChart, 200);
  if (slide.querySelector('#cdt-chart'))        setTimeout(initCdtChart, 200);
  if (slide.querySelector('#enla-lec-chart'))   setTimeout(initEnlaCharts, 200);
  if (slide.querySelector('#enla-lec-2025'))    setTimeout(initEnlaDonut, 200);
  if (slide.querySelector('#inicial-chart'))    setTimeout(initInicialChart, 200);
  if (slide.querySelector('#ebr-chart'))        setTimeout(initEbrChart, 200);
  if (slide.querySelector('#prim-chart'))       setTimeout(initPrimChart, 200);
  if (slide.querySelector('#sec-breakdown-chart')) setTimeout(initSecBreakdownChart, 200);
  if (slide.querySelector('#mat-reg-chart'))    setTimeout(initMatRegChart, 200);
  if (slide.querySelector('#hist-ugel-chart'))  setTimeout(initHistUgelChart, 200);
  if (slide.querySelector('#lec-reg-chart'))    setTimeout(initLecRegChart, 200);
  if (slide.querySelector('#hist-puno-chart'))  setTimeout(initHistPunoChart, 200);
  if (slide.querySelector('#sec-lec-chart'))    setTimeout(initSecChart, 200);
  if (slide.querySelector('#adq-bienes-chart')) setTimeout(initAdqBienesChart, 200);
  animateSlideIn(slide);
  toggleParticles(slide);
  setTimeout(() => {
    animateCounters(slide);
    initTypedTitle(slide);
    initSwipers(slide);
  }, 300);
}

Reveal.on('slidechanged', e => onSlide(e.currentSlide));
